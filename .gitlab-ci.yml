stages:
  - Build
  - Unit_Testing
  - Push

GCC_build:
  stage: Build
  tags:
    - docker
  image: dshtrigel/gcc_edu:latest
  script:
    - bash ./pipeline/pipeline_scripts/build.sh
  artifacts:
    expire_in: 24 hour
    when: always
    paths:
      - Sem1/CMake/build/

run-testing:
  stage: Unit_Testing
  tags:
    - docker
  image: dshtrigel/gcc_edu:latest
  script:
    - bash ./pipeline/pipeline_scripts/run_tests.sh
  artifacts:
    expire_in: 24 hour
    when: always
    paths:
      - Sem1/CMake/build/
  needs: [GCC_build]

Push_to_github:
  stage: Push
  tags:
    - docker
  image: gcc:latest
  variables:
    GITHUB_MIRROR_BRANCH: main
    GITHUB_REPO: github.com/klokovegor/mirror_gitlab_example
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - git remote add github "https://${GITHUB_ACCESS_TOKEN}@${GITHUB_REPO}" 2>/dev/null || git remote set-url github "https://${GITHUB_ACCESS_TOKEN}@${GITHUB_REPO}"
    - git fetch github "${GITHUB_MIRROR_BRANCH}" 2>/dev/null || true
    - git checkout -B github_mirror "github/${GITHUB_MIRROR_BRANCH}" 2>/dev/null || git checkout -B github_mirror "origin/${CI_DEFAULT_BRANCH}"
    # Удалить все файлы из текущей ветки (индекс + рабочая директория), чтобы на GitHub ушли удаления неактуальных файлов
    - git rm -rfq . 2>/dev/null || true
    # Залить содержимое последнего коммита мастера GitLab
    - git archive "origin/${CI_DEFAULT_BRANCH}" | tar -x -C .
    - rm -rf testing/oiltransport_schemes/cold_tu_tags_db testing/oiltransport_schemes/hot_tu1
    - git add -A
    - git config user.email "ci@gitlab"
    - git config user.name "GitLab CI"
    - git diff --staged --quiet || (printf '%s\n' "$CI_COMMIT_MESSAGE" | git commit -F -)
    - git push github "github_mirror:${GITHUB_MIRROR_BRANCH}"
